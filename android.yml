name: Build Signed APK
on: push: branches: - main
jobs: build: runs-on: ubuntu-latest
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: Decode Keystore
    run: |
      echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-key.jks

  - name: Grant Execute Permission
    run: chmod +x gradlew

    - name: Copy Keystore
        run: cp release-key.jks app/release-key.jks

  - name: Build Release APK
    run: ./gradlew assembleRelease

  -

  - name: Upload Signed APK
    uses: actions/upload-artifact@v4
    with:
      name: Abu-Almulatham-Release
      path: app/build/outputs/apk/release/app-release-unsigned.apk      -keypass "${{ secrets.KEY_PASSWORD }}" \
      app/build/outputs/apk/release/app-release-unsigned.apk \
      "${{ secrets.ALIAS }}"

  - name: Upload Signed APK
    uses: actions/upload-artifact@v4
    with:
      name: Abu-Almulatham-Release
      path: app/build/outputs/apk/release/app-release-unsigned.apk
